<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Style Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5" id="registerPage">
    <div class="register-card">
        <h2 class="mb-3">Register To Continue</h2>
        <p class="text-muted">Register once, then continue shopping in Street Style Shop.</p>
        <div id="statusMessage" class="alert d-none" role="alert"></div>
        <form id="userForm">
            <input type="text" class="form-control mb-3" name="name" placeholder="Full Name" required>
            <input type="email" class="form-control mb-3" name="email" placeholder="Email" required>
            <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
            <button class="btn btn-success w-100">Register</button>
        </form>
    </div>
</div>

<div id="shopPage" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="showSection('home')">Street Style Shop</a>

            <div>
                <button class="btn btn-outline-light me-2" onclick="showSection('home')">Home</button>

                <button class="btn btn-outline-light me-2" onclick="showSection('cart')">
                    Cart <span id="cartCount" class="cart-badge">0</span>
                </button>

                <button class="btn btn-warning" onclick="showSection('checkout')">
                    Checkout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="shopMessage" class="alert d-none" role="alert"></div>

        <div id="home" class="section active-section">
            <div class="row" id="productList"></div>
        </div>

        <div id="cart" class="section">
            <h3>Your Cart</h3>
            <div id="cartItems"></div>
            <h4 class="mt-3">Total: Rs.<span id="totalPrice">0</span></h4>
        </div>

        <div id="checkout" class="section">
            <h3>Checkout</h3>
            <form id="checkoutForm">
                <input type="text" id="checkoutName" class="form-control mb-3" placeholder="Full Name" required>
                <input type="email" id="checkoutEmail" class="form-control mb-3" placeholder="Email" required>
                <input type="text" id="checkoutAddress" class="form-control mb-3" placeholder="Address" required>
                <button class="btn btn-success w-100">Place Order</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
