<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Street Style Shop</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="showSection('home')">Street Style Shop</a>

        <div>
            <button class="btn btn-outline-light me-2" onclick="showSection('home')">Home</button>

            <button class="btn btn-outline-light me-2" onclick="showSection('cart')">
                Cart <span id="cartCount" class="cart-badge">0</span>
            </button>

            <button class="btn btn-warning" onclick="showSection('checkout')">
                Checkout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <!-- Home Section -->
    <div id="home" class="section active-section">
        <div class="row" id="productList">
            <!-- 🔥 Products from backend will be inserted here -->
        </div>
    </div>

    <!-- Cart Section -->
    <div id="cart" class="section">
        <h3>Your Cart</h3>
        <div id="cartItems"></div>
        <h4 class="mt-3">Total: ₹<span id="totalPrice">0</span></h4>
    </div>

    <!-- Checkout Section -->
    <div id="checkout" class="section">
        <h3>Checkout</h3>
        <form onsubmit="placeOrder(event)">
            <input type="text" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" class="form-control mb-3" placeholder="Email" required>
            <input type="text" class="form-control mb-3" placeholder="Address" required>
            <button class="btn btn-success w-100">Place Order</button>
        </form>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 Backend Integration Script -->
<script>
fetch("http://localhost:5000/api/products")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("productList");

    container.innerHTML = ""; // clear old data

    data.forEach(product => {
      const div = document.createElement("div");
      div.classList.add("col-md-4");

      div.innerHTML = `
        <div class="card mb-4 shadow">
            <img src="http://localhost:5000/uploads/${product.image}" class="card-img-top" height="200">
            <div class="card-body">
                <h5 class="card-title">${product.title}</h5>
                <p class="card-text">₹${product.price}</p>
                <button class="btn btn-primary w-100" onclick="addToCart('${product._id}', '${product.title}', ${product.price})">
                    Add to Cart
                </button>
            </div>
        </div>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.log(err));
</script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
